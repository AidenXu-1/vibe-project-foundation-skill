name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile check
        run: |
          bash -n scaffold.sh
          bash -n scripts/verify_scaffold.sh

      - name: Run verifier
        run: |
          bash scripts/verify_scaffold.sh
